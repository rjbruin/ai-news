# nginx site config for ainews.rjbruintjes.nl
# Place in /etc/nginx/sites-available/ainews and symlink into sites-enabled.
# TLS certs via certbot:  certbot --nginx -d ainews.rjbruintjes.nl

server {
    listen 80;
    server_name ainews.rjbruintjes.nl;

    # Let certbot manage the redirect to HTTPS after issuing certs.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name ainews.rjbruintjes.nl;

    ssl_certificate     /etc/letsencrypt/live/ainews.rjbruintjes.nl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ainews.rjbruintjes.nl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 16m;

    # Serve static files directly.
    location /static/ {
        alias /opt/ainews/current/app/static/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:5090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
