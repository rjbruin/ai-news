{% extends "base.html" %}
{% block title %}Generating · {{ summary.name }} · AI News{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-3 mb-3">
  <a href="{{ url_for('web.summaries') }}" class="btn btn-sm btn-outline-secondary">← Summaries</a>
  <div class="flex-grow-1">
    <h1 class="h3 mb-0">Generating edition</h1>
    <div class="small text-body-secondary">{{ summary.name }}</div>
  </div>
  <div id="status-indicator">
    <span class="spinner-border spinner-border-sm text-primary me-1" role="status"></span>
    <span class="text-body-secondary small">Running…</span>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-body p-0">
    <div id="agent-log"
         data-summary-id="{{ summary.id }}"
         class="p-3 font-monospace small overflow-auto"
         style="min-height: 220px; max-height: 65vh;">
      <span class="text-body-secondary">Connecting…</span>
    </div>
  </div>
  <div class="card-footer d-none" id="footer-done">
    <a id="view-link" href="#" class="btn btn-primary btn-sm">Open edition →</a>
    <a href="{{ url_for('web.summaries') }}" class="btn btn-outline-secondary btn-sm ms-2">Back to summaries</a>
  </div>
  <div class="card-footer d-none" id="footer-error">
    <a href="{{ url_for('web.summaries') }}" class="btn btn-outline-secondary btn-sm">Back to summaries</a>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
(function () {
  const logEl = document.getElementById('agent-log');
  const indicator = document.getElementById('status-indicator');
  const summaryId = logEl.dataset.summaryId;
  let placeholderCleared = false;

  function clearPlaceholder() {
    if (!placeholderCleared) {
      logEl.innerHTML = '';
      placeholderCleared = true;
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function append(html) {
    clearPlaceholder();
    logEl.insertAdjacentHTML('beforeend', html);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setStatus(html) {
    indicator.innerHTML = html;
  }

  const source = new EventSource(`/summaries/${summaryId}/generate/stream`);

  source.onmessage = function (e) {
    const ev = JSON.parse(e.data);

    if (ev.type === 'start') {
      append(
        `<div class="text-info-emphasis mb-1">` +
        `▶ ${ev.items} item(s) in scope · model: <code>${esc(ev.model)}</code>` +
        `</div>`
      );

    } else if (ev.type === 'llm_call') {
      append(
        `<div class="mt-2 text-body-secondary">` +
        `<span class="text-primary fw-semibold">Step ${ev.step}</span> — calling LLM` +
        `<span class="spinner-border spinner-border-sm ms-2 align-middle" ` +
        `      id="step-spinner-${ev.step}" role="status"></span>` +
        `</div>`
      );

    } else if (ev.type === 'tool_call') {
      const sp = document.getElementById(`step-spinner-${ev.step}`);
      if (sp) sp.remove();
      append(
        `<div class="ms-3">` +
        `<span class="text-success">→</span> ` +
        `<code class="text-primary">${esc(ev.name)}</code>` +
        `<span class="text-body-secondary"> ${esc(ev.args_preview)}</span>` +
        `</div>`
      );

    } else if (ev.type === 'tool_result') {
      append(
        `<div class="ms-3 text-body-secondary">` +
        `<span class="text-secondary">←</span> ${esc(ev.preview)}` +
        `</div>`
      );

    } else if (ev.type === 'stop') {
      // remove any lingering step spinner (model returned no tool calls)
      const sp = document.getElementById(`step-spinner-${ev.step}`);
      if (sp) sp.remove();
      const reasons = {
        no_tool_calls: 'agent finished',
        max_steps: 'hit step limit',
        token_limit: 'hit token budget',
      };
      append(
        `<div class="mt-2 pt-2 border-top text-body-secondary">` +
        `■ ${reasons[ev.reason] || ev.reason} — ` +
        `${ev.step} step(s), ${ev.total_tokens} tokens` +
        `</div>`
      );

    } else if (ev.type === 'done') {
      source.close();
      append(`<div class="mt-2 text-success fw-semibold">✓ Edition ready</div>`);
      setStatus('<span class="text-success small fw-semibold">✓ Done</span>');
      const footer = document.getElementById('footer-done');
      footer.classList.remove('d-none');
      document.getElementById('view-link').href =
        `/summaries/${summaryId}/editions/${ev.run_id}`;

    } else if (ev.type === 'error') {
      source.close();
      append(`<div class="mt-2 text-danger fw-semibold">✗ ${esc(ev.message)}</div>`);
      setStatus('<span class="text-danger small fw-semibold">✗ Error</span>');
      document.getElementById('footer-error').classList.remove('d-none');
    }
  };

  source.onerror = function () {
    source.close();
    append('<div class="mt-2 text-danger">✗ Connection lost.</div>');
    setStatus('<span class="text-danger small fw-semibold">✗ Disconnected</span>');
    document.getElementById('footer-error').classList.remove('d-none');
  };
}());
</script>
{% endblock %}
