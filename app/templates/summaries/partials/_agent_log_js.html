{# Shared rendering logic for agent run logs: used by the live (SSE) debug
   page and the static per-edition log replay page. #}
<script>
function createAgentLog(logEl, statusEl, costEl) {
  let placeholderCleared = false;

  function clearPlaceholder() {
    if (!placeholderCleared) {
      logEl.innerHTML = '';
      placeholderCleared = true;
    }
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function append(html) {
    clearPlaceholder();
    logEl.insertAdjacentHTML('beforeend', html);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function fmtCost(c) {
    return '$' + (c || 0).toFixed(4);
  }

  function setCost(c) {
    if (costEl) costEl.textContent = 'Cost so far: ' + fmtCost(c);
  }

  function setStatus(html) {
    if (statusEl) statusEl.innerHTML = html;
  }

  function handleEvent(ev) {
    if (ev.type === 'start') {
      append(
        `<div class="text-info-emphasis mb-1">` +
        `▶ ${ev.items} item(s) in scope · model: <code>${esc(ev.model)}</code>` +
        `</div>`
      );

    } else if (ev.type === 'llm_call') {
      append(
        `<div class="mt-2 text-body-secondary">` +
        `<span class="text-primary fw-semibold">Step ${ev.step}</span> — calling LLM` +
        `<span class="spinner-border spinner-border-sm ms-2 align-middle" ` +
        `      id="step-spinner-${ev.step}" role="status"></span>` +
        `</div>`
      );

    } else if (ev.type === 'tool_call') {
      const sp = document.getElementById(`step-spinner-${ev.step}`);
      if (sp) sp.remove();
      append(
        `<div class="ms-3">` +
        `<span class="text-success">→</span> ` +
        `<code class="text-primary">${esc(ev.name)}</code>` +
        `<span class="text-body-secondary"> ${esc(ev.args_preview)}</span>` +
        `</div>`
      );

    } else if (ev.type === 'tool_result') {
      append(
        `<div class="ms-3 text-body-secondary">` +
        `<span class="text-secondary">←</span> ${esc(ev.preview)}` +
        `</div>`
      );

    } else if (ev.type === 'usage') {
      setCost(ev.total_cost);

    } else if (ev.type === 'stop') {
      // remove any lingering step spinner (model returned no tool calls)
      const sp = document.getElementById(`step-spinner-${ev.step}`);
      if (sp) sp.remove();
      const reasons = {
        no_tool_calls: 'agent finished',
        max_steps: 'hit step limit',
        token_limit: 'hit token budget',
      };
      append(
        `<div class="mt-2 pt-2 border-top text-body-secondary">` +
        `■ ${reasons[ev.reason] || ev.reason} — ` +
        `${ev.step} step(s), ${ev.total_tokens} tokens, ${fmtCost(ev.total_cost)}` +
        `</div>`
      );
      setCost(ev.total_cost);

    } else if (ev.type === 'done') {
      append(`<div class="mt-2 text-success fw-semibold">✓ Edition ready</div>`);
      setStatus('<span class="text-success small fw-semibold">✓ Done</span>');

    } else if (ev.type === 'error') {
      append(`<div class="mt-2 text-danger fw-semibold">✗ ${esc(ev.message)}</div>`);
      setStatus('<span class="text-danger small fw-semibold">✗ Error</span>');

    } else if (ev.type === 'cancelled') {
      append(`<div class="mt-2 text-warning-emphasis fw-semibold">⊘ Cancelled</div>`);
      setStatus('<span class="text-warning-emphasis small fw-semibold">⊘ Cancelled</span>');
    }
  }

  return { handleEvent, setCost, setStatus };
}
</script>
