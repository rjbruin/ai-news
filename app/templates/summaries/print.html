<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ run.label or run.generated_at.strftime('%Y-%m-%d') }} · {{ summary.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  <style>
    @page { margin: 1.5cm 2cm; }
    @media screen {
      body { max-width: 740px; margin: 2rem auto; padding: 0 1.25rem; }
    }
    /* always suppress external-link arrows in this clean view */
    a[target="_blank"]::after { display: none !important; }
  </style>
</head>
<body>

{% if is_agentic and run.document %}
  {% from "summaries/partials/_blocks.html" import render_blocks %}
  {{ render_blocks(run.document) }}
{% elif run.content %}
  {{ run.content | safe }}
{% else %}
  <p class="text-body-secondary">This edition has no stored content.</p>
{% endif %}

<script>
  window.addEventListener('load', function () { window.print(); });
</script>
</body>
</html>
