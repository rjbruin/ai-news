{% extends "base.html" %}
{% block title %}Tag try-out · AI News{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Try out a tag</h1>
<p class="text-body-secondary">Enter a candidate tag and see which existing news items it would match — before saving it.</p>
<form id="tryout-form" method="post" class="card shadow-sm mb-4">
  <div class="card-body row g-3">
    <div class="col-md-4">
      <label class="form-label">Name</label>
      <input name="name" class="form-control" value="{{ form_data.name }}" required>
    </div>
    <div class="col-md-8">
      <label class="form-label">Keywords (comma-separated)</label>
      <input name="keywords" class="form-control" value="{{ form_data.keywords }}">
    </div>
    <div class="col-12">
      <label class="form-label">Explanation</label>
      <textarea name="explanation" class="form-control" rows="2">{{ form_data.explanation }}</textarea>
    </div>
    {% if current_user.is_admin %}
    <div class="col-12">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="make_global" id="make_global">
        <label class="form-check-label" for="make_global">Make global (visible to all users)</label>
      </div>
    </div>
    {% endif %}
  </div>
  <div class="card-footer d-flex justify-content-end gap-2">
    <button id="btn-preview" type="button" class="btn btn-outline-secondary">Preview matches</button>
    <button type="submit" name="action" value="save" class="btn btn-primary">Save tag</button>
  </div>
</form>

<div id="preview-results"></div>
{% endblock %}

{% block scripts %}
<script>
const streamUrl = {{ url_for('web.tag_tryout_stream') | tojson }};
let es = null;

document.getElementById('btn-preview').addEventListener('click', function () {
  if (es) { es.close(); es = null; }

  const form = document.getElementById('tryout-form');
  const name = form.querySelector('[name="name"]').value.trim();
  if (!name) { form.querySelector('[name="name"]').reportValidity(); return; }

  const params = new URLSearchParams({
    name,
    keywords: form.querySelector('[name="keywords"]').value,
    explanation: form.querySelector('[name="explanation"]').value.trim(),
  });

  const root = document.getElementById('preview-results');
  root.innerHTML = '<p class="text-body-secondary mb-0"><span class="spinner-border spinner-border-sm me-2"></span>Starting…</p>';

  let matchCount = 0, total = 0;

  es = new EventSource(streamUrl + '?' + params);

  es.onmessage = function (e) {
    const ev = JSON.parse(e.data);

    if (ev.type === 'start') {
      total = ev.total;
      root.innerHTML =
        '<p id="prog" class="text-body-secondary mb-2">' +
          '<span class="spinner-border spinner-border-sm me-2"></span>' +
          'Checking 0 of ' + total + '…' +
        '</p>' +
        '<div id="matches" class="list-group shadow-sm"></div>';

    } else if (ev.type === 'checking') {
      prog('Checking ' + ev.current + ' of ' + total + '… <span class="text-truncate d-inline-block" style="max-width:40ch;vertical-align:bottom">' + esc(ev.title) + '</span>');

    } else if (ev.type === 'no_match') {
      prog('Checking ' + ev.current + ' of ' + total + '…');

    } else if (ev.type === 'match') {
      matchCount++;
      prog('Checking ' + ev.current + ' of ' + total + '… — ' + matchCount + ' match' + (matchCount !== 1 ? 'es' : '') + ' so far');
      const div = document.createElement('div');
      div.className = 'list-group-item d-flex justify-content-between align-items-start';
      div.innerHTML =
        '<div><div class="fw-semibold">' + esc(ev.title) + '</div>' +
        '<div class="small text-body-secondary">' + esc(ev.summary) + '</div></div>' +
        '<div class="d-flex gap-1 ms-2 flex-shrink-0">' +
          '<span class="badge text-bg-secondary">' + ev.method + '</span>' +
          '<span class="badge text-bg-primary">' + ev.confidence + '</span>' +
        '</div>';
      document.getElementById('matches').appendChild(div);

    } else if (ev.type === 'done') {
      es.close(); es = null;
      if (matchCount === 0) {
        root.innerHTML =
          '<h2 class="h5">0 matching item(s)</h2>' +
          '<div class="list-group shadow-sm"><div class="list-group-item text-body-secondary">No items matched above the confidence threshold.</div></div>';
      } else {
        const p = document.getElementById('prog');
        if (p) p.remove();
        const h = document.createElement('h2');
        h.className = 'h5 mb-2';
        h.textContent = matchCount + ' matching item(s)';
        root.insertBefore(h, root.firstChild);
      }

    } else if (ev.type === 'error') {
      es.close(); es = null;
      root.innerHTML = '<div class="alert alert-danger">' + esc(ev.message) + '</div>';
    }
  };

  es.onerror = function () {
    if (es) { es.close(); es = null; }
    const p = document.getElementById('prog');
    if (p) p.textContent = 'Connection lost. Please try again.';
  };
});

function prog(html) {
  const p = document.getElementById('prog');
  if (p) p.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
{% endblock %}
