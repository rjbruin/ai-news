{% extends "base.html" %}
{% from "partials/_news_item.html" import news_item %}
{% block title %}News · AI News{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h1 class="h3 mb-0">News</h1>
</div>

<div class="list-group shadow-sm">
  {% for item in items %}
  {{ news_item(item) }}
  {% else %}
  <div class="list-group-item text-body-secondary">No news items match.</div>
  {% endfor %}
</div>
{% endblock %}
