<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3a5f"/>
      <stop offset="1" stop-color="#16293f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Newsletter / newspaper -->
  <g transform="translate(96 120)">
    <rect x="0" y="0" width="300" height="272" rx="16" fill="#f6f1e7" stroke="#d9cdb8" stroke-width="4"/>
    <!-- folded right page -->
    <rect x="300" y="24" width="20" height="248" rx="8" fill="#e7ddc8"/>
    <!-- masthead -->
    <rect x="24" y="26" width="252" height="34" rx="6" fill="#1f3a5f"/>
    <rect x="36" y="36" width="120" height="14" rx="4" fill="#f6f1e7"/>
    <!-- headline image block -->
    <rect x="24" y="78" width="120" height="86" rx="8" fill="#c8843a"/>
    <!-- text lines -->
    <g fill="#9aa6b2">
      <rect x="156" y="80" width="120" height="12" rx="6"/>
      <rect x="156" y="104" width="120" height="12" rx="6"/>
      <rect x="156" y="128" width="96" height="12" rx="6"/>
      <rect x="156" y="152" width="110" height="12" rx="6"/>
      <rect x="24" y="184" width="252" height="12" rx="6"/>
      <rect x="24" y="208" width="252" height="12" rx="6"/>
      <rect x="24" y="232" width="180" height="12" rx="6"/>
    </g>
  </g>
</svg>
